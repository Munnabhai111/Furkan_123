<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALAM PHOTO EDITOR (With Border)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --accent: #10b981; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        .bg-scrolling-container { position: fixed; top: 50%; left: 0; width: 100%; transform: translateY(-50%); z-index: -1; pointer-events: none; opacity: 0.25; }
        .scrolling-text { font-size: 12vw; font-weight: 900; white-space: nowrap; text-transform: uppercase; color: #000; display: inline-block; animation: slowScrollWithDelay 25s linear infinite; }
        @keyframes slowScrollWithDelay { 0% { transform: translateX(100%); } 80% { transform: translateX(-100%); } 100% { transform: translateX(-100%); } }

        .corner-brand { position: fixed; bottom: 20px; right: 20px; background: #000; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 800; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; gap: 10px; border: 2px solid rgba(255,255,255,0.1); }

        .card { 
            background: rgba(255, 255, 255, 0.97); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 500px; 
            margin: auto; 
            text-align: center; 
            position: relative; 
            z-index: 10;
            animation: slideUpFade 0.8s ease-out forwards;
        }

        header { margin-bottom: 20px; color: var(--primary); }
        label { display: block; text-align: left; font-size: 13px; font-weight: 600; margin: 10px 0 5px; color: #64748b; }
        
        input, select, button { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; margin-bottom: 5px; }
        
        button.main-btn { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button.main-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        .adjust-btn { background: var(--primary); color: white; border: none; margin-top: 10px; cursor: pointer; display: none; font-weight: 600; transition: background 0.3s; }
        .adjust-btn:hover { background: #1d4ed8; }

        .download-btn { background: var(--accent) !important; }

        #editor-section { display: none; margin-top: 15px; border: 2px dashed #cbd5e1; padding: 10px; border-radius: 8px; }
        .cropper-box { width: 100%; height: 250px; background: #000; overflow: hidden; }
        img#image-preview { max-width: 100%; display: none; }
        
        .edit-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .tool-btn { padding: 8px; background: #f1f5f9; border: 1px solid #ccc; cursor: pointer; border-radius: 4px; }
        .input-group-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        canvas { max-width: 100%; height: auto; border: 1px solid #cbd5e1; margin-top: 20px; background: #fff; display: none; margin-left: auto; margin-right: auto; }
        
        @media print {
            @page { size: A4; margin: 0; }
            body * { display: none !important; }
            canvas { display: block !important; position: fixed; top: 0; left: 0; width: 100% !important; border: none !important; }
        }
    </style>
</head>
<body>

<div class="bg-scrolling-container">
    <div class="scrolling-text">KALAM JAN SEVA KENDRA &nbsp;&nbsp;•&nbsp;&nbsp; KALAM JAN SEVA KENDRA</div>
</div>

<div class="corner-brand"><i class="fa fa-university"></i> KALAM JAN SEVA KENDRA</div>

<div class="card">
    <header><h2>KALAM PHOTO EDITOR</h2></header>
    
    <label>Step 1: Upload Photo</label>
    <input type="file" id="upload" accept="image/*">
    <button id="show-adjuster" class="adjust-btn" onclick="toggleAdjuster()"><i class="fa fa-crop"></i> Adjust Photo</button>

    <div id="editor-section">
        <div class="cropper-box"><img id="image-preview"></div>
        <div class="edit-row">
            <button class="tool-btn" onclick="zoom(0.1)"><i class="fa fa-plus"></i></button>
            <button class="tool-btn" onclick="zoom(-0.1)"><i class="fa fa-minus"></i></button>
            <button class="tool-btn" onclick="rotate(-90)"><i class="fa fa-rotate-left"></i></button>
            <button class="tool-btn" onclick="rotate(90)"><i class="fa fa-rotate-right"></i></button>
        </div>
    </div>
    
    <label>Step 2: Photos per Row</label>
    <select id="cols">
        <option value="1">1 Photo</option>
        <option value="2">2 Photos</option>
        <option value="4">4 Photos</option>
        <option value="6" selected>6 Photos</option>
    </select>

    <div class="input-group-row">
        <div><label>Step 3: Total Photos</label><input type="number" id="qty" value="6"></div>
        <div><label>Gap (px)</label><input type="number" id="gap" value="20"></div>
    </div>

    <label>Step 4: Select Photo Size</label>
    <select id="photo-size" onchange="updateCropRatio()">
        <option value="380,480,0.79">Passport Size (3.5 x 4.5 cm)</option>
        <option value="1181,1772,0.67">Postcard Size (4 x 6 in)</option>
        <option value="637,1011,0.63">ID Card Photo (5.4 x 8.6 cm)</option>
        <option value="2480,3508,0.71">A4 Full Size Photo</option>
        <option value="236,295,0.80">Stamp Size (2 x 2.5 cm)</option>
        <option value="413,413,1.0">Visa Photo (3.5 x 3.5 cm)</option>
        <option value="1417,2126,0.67">Cabinet Size (12 x 18 cm)</option>
        <option value="500,500,1.0">Square Photo (Instagram)</option>
    </select>

    <button class="main-btn" onclick="generateSheet()">Generate Sheet</button>
    <button id="print-btn" class="main-btn download-btn" style="display: none;" onclick="downloadAndPrint()">Download & Print HD</button>
</div>

<canvas id="canvas" width="2480" height="3508"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    let isAdjusting = false;
    let lastCroppedImage = null;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const imagePreview = document.getElementById('image-preview');
    const uploadInput = document.getElementById('upload');
    const adjustBtn = document.getElementById('show-adjuster');
    const editorSection = document.getElementById('editor-section');

    function updateCropRatio() {
        if (cropper) {
            const sizeData = document.getElementById("photo-size").value.split(',');
            const w = parseFloat(sizeData[0]);
            const h = parseFloat(sizeData[1]);
            cropper.setAspectRatio(w / h);
        }
    }

    uploadInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            imagePreview.src = URL.createObjectURL(file);
            adjustBtn.style.display = 'block';
            lastCroppedImage = null;
            if (cropper) { cropper.destroy(); cropper = null; editorSection.style.display = 'none'; isAdjusting = false; adjustBtn.innerHTML = "<i class='fa fa-crop'></i> Adjust Photo"; }
        }
    });

    function toggleAdjuster() {
        if (!isAdjusting) {
            isAdjusting = true;
            editorSection.style.display = 'block';
            imagePreview.style.display = 'block';
            const sizeData = document.getElementById("photo-size").value.split(',');
            cropper = new Cropper(imagePreview, { 
                aspectRatio: sizeData[0]/sizeData[1], 
                viewMode: 1,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            });
            adjustBtn.innerHTML = "<i class='fa fa-check'></i> Done";
        } else {
            if (cropper) { 
                lastCroppedImage = cropper.getCroppedCanvas({
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                    fillColor: '#fff'
                }); 
                cropper.destroy(); 
                cropper = null; 
            }
            isAdjusting = false;
            editorSection.style.display = 'none';
            adjustBtn.innerHTML = "<i class='fa fa-crop'></i> Adjusted (Change?)";
        }
    }

    function zoom(v) { if(cropper) cropper.zoom(v); }
    function rotate(d) { if(cropper) cropper.rotate(d); }

    function generateSheet() {
        if (!uploadInput.files[0]) { alert("Photo upload karein!"); return; }
        const sizeData = document.getElementById("photo-size").value.split(',');
        const targetW = parseInt(sizeData[0]);
        const targetH = parseInt(sizeData[1]);
        const cols = parseInt(document.getElementById("cols").value);
        const qty = parseInt(document.getElementById("qty").value);
        const gap = parseInt(document.getElementById("gap").value);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const img = new Image();
        img.onload = function() {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.filter = "brightness(1.05) contrast(1.1) saturate(1.1)";

            let x = 120, y = 120;
            for (let i = 0; i < qty; i++) {
                const source = lastCroppedImage || img;
                ctx.drawImage(source, x, y, targetW, targetH);
                
                // --- BORDER ADDED HERE ---
                ctx.save();
                ctx.filter = "none"; // Border par brightness filter na lage
                ctx.strokeStyle = "black"; 
                ctx.lineWidth = 2; // Border ki motai
                ctx.strokeRect(x, y, targetW, targetH);
                ctx.restore();
                
                x += targetW + gap;
                if ((i + 1) % cols === 0) { x = 120; y += targetH + gap; }
            }
            
            ctx.filter = "none";
            canvas.style.display = 'block';
            document.getElementById('print-btn').style.display = 'block';
            canvas.scrollIntoView({ behavior: 'smooth' });
        };

        if (lastCroppedImage) {
            img.src = lastCroppedImage.toDataURL("image/png", 1.0);
        } else {
            img.src = URL.createObjectURL(uploadInput.files[0]);
        }
    }

    function downloadAndPrint() {
        const link = document.createElement('a');
        link.download = 'kalam_print_hd.png';
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
        setTimeout(() => { window.print(); }, 500);
    }
</script>
</body>
</html>
